version: '3.8'

services:
  auth-service:
    build:
      context: ./auth-service
    container_name: medilink-auth
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - ./auth-service/.env
    networks:
      - medilink-network

  appointment-service:
    build:
      context: ./appointment-service
    container_name: medilink-appointment
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    env_file:
      - ./appointment-service/.env
    networks:
      - medilink-network

  doctor-service:
    build:
      context: ./doctor-service
    container_name: medilink-doctor
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - CLOUDINARY_URL=cloudinary://334213839224793:6Vs2LWGTMoQ3tA87qcR7JovBs9k@dnjq7l123
      - APPOINTMENT_SERVICE_URL=http://medilink-appointment:5002
      - PATIENT_SERVICE_URL=http://medilink-patient:3000
    env_file:
      - ./doctor-service/.env
    networks:
      - medilink-network
    depends_on:
      - appointment-service
      - patient-service

  patient-service:
    build:
      context: ./patient-service
    container_name: medilink-patient
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CLOUDINARY_URL=cloudinary://334213839224793:6Vs2LWGTMoQ3tA87qcR7JovBs9k@dnjq7l123
    env_file:
      - ./patient-service/.env
    networks:
      - medilink-network

  client:
    build:
      context: ./client
    container_name: medilink-client
    ports:
      - "5173:5173"
    networks:
      - medilink-network
    depends_on:
      - auth-service
      - appointment-service
      - doctor-service
      - patient-service

networks:
  medilink-network:
    driver: bridge
