version: '3.8'

services:
  auth-service:
    build:
      context: ./auth-service
    container_name: medilink-auth
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - ./auth-service/.env
    networks:
      - medilink-network

  ai-symptom-service:
    build:
      context: ./ai-symptom-service
    container_name: medilink-ai-symptom
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
    env_file:
      - ./ai-symptom-service/.env
    networks:
      - medilink-network

  appointment-service:
    build:
      context: ./appointment-service
    container_name: medilink-appointment
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - AUTH_SERVICE_URL=http://medilink-auth:5000
    env_file:
      - ./appointment-service/.env
    networks:
      - medilink-network
    depends_on:
      - ai-symptom-service

  doctor-service:
    build:
      context: ./doctor-service
    container_name: medilink-doctor
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - CLOUDINARY_URL=cloudinary://334213839224793:6Vs2LWGTMoQ3tA87qcR7JovBs9k@dnjq7l123
      - APPOINTMENT_SERVICE_URL=http://medilink-appointment:3002
      - PATIENT_SERVICE_URL=http://medilink-patient:3000
    env_file:
      - ./doctor-service/.env
    networks:
      - medilink-network
    depends_on:
      - appointment-service
      - patient-service

  telemedicine-service:
    build:
      context: ./telemedicine-service
    container_name: medilink-telemedicine
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    env_file:
      - ./telemedicine-service/.env
    networks:
      - medilink-network

  notification-service:
    build:
      context: ./notification-service
    container_name: medilink-notification
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    env_file:
      - ./notification-service/.env
    networks:
      - medilink-network

  payment-service:
    build:
      context: ./payment-service
    container_name: medilink-payment
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - APPOINTMENT_SERVICE_URL=http://medilink-appointment:3002
    env_file:
      - ./payment-service/.env
    networks:
      - medilink-network
    depends_on:
      - appointment-service

  patient-service:
    build:
      context: ./patient-service
    container_name: medilink-patient
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CLOUDINARY_URL=cloudinary://334213839224793:6Vs2LWGTMoQ3tA87qcR7JovBs9k@dnjq7l123
    env_file:
      - ./patient-service/.env
    networks:
      - medilink-network

  client:
    build:
      context: ./client
    container_name: medilink-client
    ports:
      - "5173:5173"
    networks:
      - medilink-network
    depends_on:
      - auth-service
      - ai-symptom-service
      - appointment-service
      - doctor-service
      - telemedicine-service
      - patient-service
      - notification-service
      - payment-service

networks:
  medilink-network:
    driver: bridge

