apiVersion: v1
kind: Secret
metadata:
  name: ai-symptom-service-secrets
  namespace: default
  labels:
    app: ai-symptom-service
type: Opaque
stringData:
  # Replace these with your actual values
  gemini-api-key: "your_gemini_api_key_here"
  jwt-secret: "your_jwt_secret_key_here_change_in_production"
