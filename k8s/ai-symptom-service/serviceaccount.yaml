apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-symptom-service
  namespace: default
  labels:
    app: ai-symptom-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-symptom-service
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-symptom-service
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-symptom-service
subjects:
  - kind: ServiceAccount
    name: ai-symptom-service
    namespace: default
