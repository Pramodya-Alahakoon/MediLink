apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: default
  labels:
    app: appointment-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
        version: v1
    spec:
      serviceAccountName: appointment-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: appointment-service
          image: your-registry/medilink/appointment-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5002"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secrets
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secrets
                  key: jwt-secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secrets
                  key: gemini-api-key
            - name: JWT_LIFETIME
              value: "1d"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: auth-service-url
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: doctor-service-url
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: notification-service-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: node-cache
              mountPath: /app/.npm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: node-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - appointment-service
                topologyKey: kubernetes.io/hostname
