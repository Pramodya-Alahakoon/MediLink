apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secrets
  namespace: default
  labels:
    app: payment-service
type: Opaque
stringData:
  # Replace these with your actual values
  mongo-uri: "mongodb+srv://username:password@cluster.mongodb.net/medilink-payments?retryWrites=true&w=majority"
  jwt-secret: "your_jwt_secret_key_here_change_in_production"
  stripe-secret-key: "sk_test_your_secret_key_here"
  stripe-publishable-key: "pk_test_your_publishable_key_here"
  stripe-webhook-secret: "whsec_your_webhook_secret_here"
