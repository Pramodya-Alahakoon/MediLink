apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      serviceAccountName: notification-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: notification-service
          image: your-registry/medilink/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5003
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5003"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: mongo-uri
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: gmail-user
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: gmail-app-password
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: email-from
            - name: NOTIFY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: notify-api-key
            - name: NOTIFY_SENDER_ID
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: notify-sender-id
            - name: NOTIFY_USER_ID
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: notify-user-id
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: rabbitmq-url
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: client-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: node-cache
              mountPath: /app/.npm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: node-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - notification-service
                topologyKey: kubernetes.io/hostname
