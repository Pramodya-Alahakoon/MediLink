apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      serviceAccountName: api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api-gateway
          image: your-registry/medilink/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: auth-service-url
            - name: PATIENT_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: patient-service-url
            - name: APPOINTMENT_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: appointment-service-url
            - name: DOCTOR_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: doctor-service-url
            - name: PAYMENT_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: payment-service-url
            - name: NOTIFICATION_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: notification-service-url
            - name: TELEMEDICINE_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: telemedicine-service-url
            - name: AI_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: ai-service-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: node-cache
              mountPath: /app/.npm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: node-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
