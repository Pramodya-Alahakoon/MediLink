apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: medilink
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: medilink-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          env:
            - name: NODE_ENV
              value: "production"
