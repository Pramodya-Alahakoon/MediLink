apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: medilink
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: medilink-notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              value: "mongodb+srv://chiransamiru2002_db_user:Medilink2026@cluster0.ytfzhlz.mongodb.net/notification-service?retryWrites=true&w=majority&appName=Cluster0"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
