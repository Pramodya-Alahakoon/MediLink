              value: "mongodb+srv://sankamaduwantha68_db_user:5wF11ohedlW4LeYS@cluster0.ahvletz.mongodb.net/?appName=Cluster0"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:5002"
