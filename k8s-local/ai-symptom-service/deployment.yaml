apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: medilink
  labels:
    app: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: medilink-ai-symptom-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: GEMINI_API_KEY
              value: "your_gemini_api_key_here"
